name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Pytest with coverage
        run: pytest --cov=svg --cov-report=term-missing -q

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sound-visualisation-generator:test .

      - name: Smoke test in container
        run: docker run --rm sound-visualisation-generator:test python -c "import svg; print('smoke test passed')"

      - name: Ruff (lint) in container
        run: docker run --rm sound-visualisation-generator:test ruff check .

      - name: Ruff (format check) in container
        run: docker run --rm sound-visualisation-generator:test ruff format --check .

      - name: Pytest in container
        run: docker run --rm sound-visualisation-generator:test pytest -q